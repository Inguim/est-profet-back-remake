get:
  tags: [Solicitações]
  summary: Busca uma solicitação por ID
  security:
    - BearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      description: ID do solicitação
      schema:
        type: string
        example: "123"
  responses:
    "200":
      description: Solicitação encontrada com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Solicitação criada com sucesso
              data:
                $ref: "../../../components/schemas/solicitacao/get.yaml"
    "401":
      $ref: "../../../components/responses/401_usuario_sem_autorizacao.yaml"
    "404":
      $ref: "../../../components/responses/404_not_found.yaml"

patch:
  tags: [Solicitações]
  summary: Atualiza uma solicitação existente
  security:
    - BearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      description: ID da solicitacação
      schema:
        type: string
        example: "123"

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../components/schemas/solicitacao/update.yaml"

  responses:
    "200":
      description: Solicitação atualizada com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Solicitação atualizada com sucesso
              data:
                $ref: "../../../components/schemas/solicitacao/get.yaml"
    "400":
      $ref: "../../../components/responses/400_validacao.yaml"
    "404":
      $ref: "../../../components/responses/404_not_found.yaml"

delete:
  tags: [Solicitações]
  summary: Deleta uma solicitação
  security:
    - BearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      description: ID da solicitação
      schema:
        type: string
        example: "123"
  responses:
    "204":
      $ref: "../../../components/responses/204_no_content.yaml"
    "401":
      $ref: "../../../components/responses/401_usuario_sem_autorizacao.yaml"
    "404":
      $ref: "../../../components/responses/404_not_found.yaml"
