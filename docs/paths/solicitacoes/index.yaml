post:
  tags: [Solicitações]
  summary: Cria uma nova solicitação
  security:
    - BearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/solicitacao/create.yaml"
  responses:
    "201":
      description: Solicitação criada com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Solicitação criada com sucesso
              data:
                allOf:
                  - $ref: "../../components/schemas/solicitacao/item.yaml"
                  - type: object
                    properties:
                      status:
                        type: object
                        properties:
                          value:
                            type: string
                            enum:
                              - aguardando
                              - alterado
                              - aprovado
                              - recusado
                          label:
                            type: string
                            enum:
                              - Aguardando
                              - Alterado
                              - Aprovado
                              - Recusado
    "400":
      $ref: "../../components/responses/400_validacao.yaml"
    "401":
      $ref: "../../components/responses/401_usuario_sem_autorizacao.yaml"

get:
  tags: [Solicitações]
  summary: Retorna uma lista de Solicitações
  security:
    - BearerAuth: []
  parameters:
    - name: status
      in: query
      description: Status da solicitação
      schema:
        type: string
        enum:
          - aguardando
          - alterado
          - aprovado
          - recusado
    - name: page
      in: query
      description: Página
      schema:
        type: number
        example: 1
    - name: perPage
      in: query
      description: Quantidade por página
      schema:
        type: number
        example: 5
    - name: ordering
      in: query
      description: Ordenado por
      schema:
        type: string
        enum:
          - updated_at__asc
        example: updated_at__asc
  responses:
    "200":
      description: "Retorna uma lista de Solicitações"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Solicitações buscadas com sucesso
              data:
                $ref: "../../components/schemas/solicitacao/collection.yaml"
