post:
  tags: [Notícias]
  summary: Cria uma nova notícia
  security:
    - BearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/noticia/create.yaml"
  responses:
    "201":
      description: Notícia criada com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Notícia criada com sucesso
              data:
                $ref: "../../components/schemas/noticia/item.yaml"

    "400":
      $ref: "../../components/responses/400_validacao.yaml"
    "401":
      $ref: "../../components/responses/401_usuario_sem_autorizacao.yaml"

get:
  tags: [Notícias]
  summary: Retorna uma lista de Notícias
  parameters:
    - name: user_id
      in: query
      description: Id do publicador da notícia
      schema:
        type: string
    - name: page
      in: query
      description: Página
      schema:
        type: number
        example: 1
    - name: perPage
      in: query
      description: Quantidade por página
      schema:
        type: number
        example: 5
  responses:
    "200":
      description: Retorna uma lista de notícias
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Notícias buscadas com sucesso
              data:
                $ref: "../../components/schemas/noticia/collection.yaml"
