put:
  tags: [Notícias]
  summary: Atualiza uma notícia existente
  security:
    - BearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      description: ID do notícia
      schema:
        type: string
        example: "123"

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../components/schemas/noticia/update.yaml"

  responses:
    "200":
      description: Notícia atualizada com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Notícia atualizada com sucesso
              data:
                allOf:
                  - $ref: "../../../components/schemas/noticia/item.yaml"
                  - type: object
                    properties:
                      github_dados:
                        deprecated: true
    "400":
      $ref: "../../../components/responses/400_validacao.yaml"
    "401":
      $ref: "../../../components/responses/401_usuario_sem_autorizacao.yaml"
    "404":
      $ref: "../../../components/responses/404_not_found.yaml"

get:
  tags: [Notícias]
  summary: Busca uma notícia por ID
  parameters:
    - name: id
      in: path
      required: true
      description: ID da notícia
      schema:
        type: string
        example: "123"
  responses:
    "200":
      description: Notícia encontrada com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Notícia encontrada com sucesso
              data:
                $ref: "../../../components/schemas/noticia/get.yaml"
    "404":
      $ref: "../../../components/responses/404_not_found.yaml"
