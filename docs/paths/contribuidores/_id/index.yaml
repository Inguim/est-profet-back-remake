put:
  tags: [Contribuidores]
  summary: Atualiza um contribuidor existente
  security:
    - BearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      description: ID do contribuidor
      schema:
        type: string
        example: "123"

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../components/schemas/contribuidor/update.yaml"

  responses:
    "200":
      description: Contribuidor atualizado com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Contribuidor atualizado com sucesso
              data:
                allOf:
                  - $ref: "../../../components/schemas/contribuidor/item.yaml"
                  - type: object
                    properties:
                      github_dados:
                        deprecated: true
    "400":
      $ref: "../../../components/responses/400_validacao.yaml"
    "404":
      $ref: "../../../components/responses/404_not_found.yaml"

get:
  tags: [Contribuidores]
  summary: Busca um contribuidor por ID
  security:
    - BearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      description: ID do contribuidor
      schema:
        type: string
        example: "123"
  responses:
    "200":
      description: Contribuidor encontrada com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Contribuidor encontrada com sucesso
              data:
                $ref: "../../../components/schemas/contribuidor/get.yaml"
    "401":
      $ref: "../../../components/responses/401_usuario_sem_autorizacao.yaml"
    "404":
      $ref: "../../../components/responses/404_not_found.yaml"

delete:
  tags: [Contribuidores]
  summary: Deleta um contribuidor
  security:
    - BearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      description: ID do contribuidor
      schema:
        type: string
        example: "123"
  responses:
    "204":
      $ref: "../../../components/responses/204_no_content.yaml"
    "401":
      $ref: "../../../components/responses/401_usuario_sem_autorizacao.yaml"
    "404":
      $ref: "../../../components/responses/404_not_found.yaml"
