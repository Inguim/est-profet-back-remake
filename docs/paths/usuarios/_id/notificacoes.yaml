get:
  tags: [Usuários]
  summary: Busca um usuário por ID
  security:
    - BearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      description: ID do usuário
      schema:
        type: string
        example: "123"
    - name: page
      in: query
      description: Página
      schema:
        type: number
        example: 1
    - name: perPage
      in: query
      description: Quantidade por página
      schema:
        type: number
        example: 10
  responses:
    "200":
      description: Retorna uma lista de Notificações do usuário
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Notificações buscadas com sucesso
              data:
                $ref: "../../../components/schemas/notificacao/collection.yaml"
    "401":
      $ref: "../../../components/responses/401_usuario_sem_autorizacao.yaml"
    "404":
      $ref: "../../../components/responses/404_not_found.yaml"
