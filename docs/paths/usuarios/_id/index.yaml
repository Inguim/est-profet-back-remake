get:
  tags: [Usuarios]
  summary: Busca um usuário por ID
  parameters:
    - name: id
      in: path
      required: true
      description: ID do usuário
      schema:
        type: string
        example: "123"
  responses:
    "200":
      description: Usuário encontrado com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Usuário criado com sucesso
              data:
                $ref: "../../../components/schemas/usuario/get.yaml"
          examples:
            aluno:
              summary: Aluno (UsuarioGetAluno)
              value:
                message: Usuario encontrado com sucesso
                data:
                  nome: string
                  email: string
                  tipo: aluno
                  status: analise
                  curso:
                    id: string
                    curso: string
                  serie:
                    id: string
                    serie: number
            professor:
              summary: Professor (UsuarioGetProfessor)
              value:
                message: Usuario encontrado com sucesso
                data:
                  nome: string
                  email: string
                  tipo: aluno
                  status: analise
                  categorias: [{ id: "1232", nome: "Engenharia" }]
    "404":
      $ref: "../../../components/responses/404_not_found.yaml"

patch:
  tags: [Usuarios]
  summary: Atualiza um usuário existente
  parameters:
    - name: id
      in: path
      required: true
      description: ID do usuário
      schema:
        type: string
        example: "123"

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../components/schemas/usuario/update.yaml"

  responses:
    "200":
      description: Usuário atualizado com sucesso
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/usuario/item.yaml"
    "400":
      $ref: "../../../components/responses/400_validacao.yaml"
    "404":
      $ref: "../../../components/responses/404_not_found.yaml"
