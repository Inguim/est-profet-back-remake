post:
  tags: [Usuarios]
  summary: Cria um novo usuário
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/usuario/create.yaml"
        examples:
          aluno:
            summary: Cria um aluno (UsuarioCreateAluno)
            value:
              nome: string
              email: string
              tipo: aluno
              status: analise
              password: number
              confirm_password: number
              curso_id: uuid
              serie_id: uuid
          professor:
            summary: Cria um aluno (UsuarioCreateProfessor)
            value:
              nome: string
              email: string
              tipo: professor
              status: analise
              password: number
              confirm_password: number

          # aluno:
          #   value:
          #     nome: string
          #     email: string
          #     tipo: aluno
          #     status: analise
          #     password: number
          #     confirm_password: number
          #     curso_id: uuid
          #     serie_id: uuid
          # professor:
          #   value:
          #     nome: string
          #     email: string
          #     tipo: professor
          #     status: analise
          #     password: number
          #     confirm_password: number

  responses:
    "201":
      description: Usuário criado com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Usuário criado com sucesso
              data:
                $ref: "../../components/schemas/usuario/item.yaml"
    "400":
      $ref: "../../components/responses/400_validacao.yaml"
