post:
  tags: [Auth]
  summary: Solicita token para redefinição de senha
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            email:
              type: string
              example: "example@mail.com"
  responses:
    "204":
      $ref: "../../components/responses/204_no_content.yaml"

patch:
  tags: [Auth]
  summary: Redefine a senha de um usuário
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            email:
              type: string
              example: "example@mail.com"
            token:
              type: string
            newPassword:
              type: string
  responses:
    "204":
      $ref: "../../components/responses/204_no_content.yaml"
