post:
  tags: [Projetos]
  summary: Cria um novo Projeto
  security:
    - BearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/projeto/create.yaml"
  responses:
    "201":
      description: Projeto criado com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Projeto criado com sucesso
              data:
                $ref: "../../components/schemas/projeto/item.yaml"
    "400":
      $ref: "../../components/responses/400_validacao.yaml"
    "401":
      $ref: "../../components/responses/401_usuario_sem_autorizacao.yaml"
