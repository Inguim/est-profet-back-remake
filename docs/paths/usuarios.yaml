post:
  tags: [Usuarios]
  summary: Cria um novo usuário
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/usuario/create.yaml"

  responses:
    "201":
      description: Usuário criado com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Usuário criado com sucesso
              data:
                $ref: "../components/schemas/usuario/usuario.yaml"
